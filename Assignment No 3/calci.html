<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>

    <!-- CSS Styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
        }

        button {
            width: 45%;
            padding: 10px;
            margin: 5px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="calculator">
    <h2>Simple Calculator</h2>

    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">

    <br>

    <button onclick="add()">Add</button>
    <button onclick="subtract()">Subtract</button>
    <button onclick="multiply()">Multiply</button>
    <button onclick="divide()">Divide</button>
    <button onclick="square()">Square</button>
    <button onclick="promptInput()">Prompt</button>

    <div class="result" id="result"></div>
</div>

<!-- JavaScript -->
<script>
    function validateInputs(n1, n2 = null) {
        if (isNaN(n1) || n1 === "") {
            alert("Please enter a valid first number");
            return false;
        }
        if (n2 !== null && (isNaN(n2) || n2 === "")) {
            alert("Please enter a valid second number");
            return false;
        }
        return true;
    }

    function add() {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        if (validateInputs(n1, n2)) {
            document.getElementById("result").innerText =
                "Result: " + (Number(n1) + Number(n2));
        }
    }

    function subtract() {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        if (validateInputs(n1, n2)) {
            document.getElementById("result").innerText =
                "Result: " + (Number(n1) - Number(n2));
        }
    }

    function multiply() {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        if (validateInputs(n1, n2)) {
            document.getElementById("result").innerText =
                "Result: " + (Number(n1) * Number(n2));
        }
    }

    function divide() {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        if (!validateInputs(n1, n2)) return;

        if (Number(n2) === 0) {
            alert("Division by zero is not allowed");
            return;
        }

        document.getElementById("result").innerText =
            "Result: " + (Number(n1) / Number(n2));
    }

    function square() {
        let n1 = document.getElementById("num1").value;

        if (validateInputs(n1)) {
            document.getElementById("result").innerText =
                "Result: " + (Number(n1) * Number(n1));
        }
    }

    function promptInput() {
        let value = prompt("Enter a number to find its square:");

        if (value === null || value === "" || isNaN(value)) {
            alert("Invalid input entered");
        } else {
            alert("Square is: " + (value * value));
        }
    }
</script>

</body>
</html>
